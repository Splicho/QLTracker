name: Release QLTracker

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: qltracker-windows-x64

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $package = Get-Content package.json | ConvertFrom-Json
          $expected = "v$($package.version)"
          $actual = "${{ github.ref_name }}"
          if ($actual -ne $expected) {
            Write-Error "Tag '$actual' does not match package.json version '$expected'."
          }

      - name: Build and publish release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          tauriScript: npm run tauri
          args: --bundles nsis
          tagName: ${{ github.ref_name }}
          releaseName: QLTracker ${{ github.ref_name }}
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
