name: Release QLTracker

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            platform: windows-latest
            rustTarget: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles nsis
            cacheKey: qltracker-windows-x64
          - name: Windows ARM64
            platform: windows-11-arm
            rustTarget: aarch64-pc-windows-msvc
            args: --target aarch64-pc-windows-msvc --bundles nsis
            cacheKey: qltracker-windows-arm64
          - name: Linux x64
            platform: ubuntu-24.04
            rustTarget: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu --bundles appimage,deb
            cacheKey: qltracker-linux-x64
          - name: Linux ARM64
            platform: ubuntu-24.04-arm
            rustTarget: aarch64-unknown-linux-gnu
            args: --target aarch64-unknown-linux-gnu --bundles appimage,deb
            cacheKey: qltracker-linux-arm64

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTarget }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ${{ matrix.cacheKey }}

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            xdg-utils \
            libxdo-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $package = Get-Content package.json | ConvertFrom-Json
          $expected = "v$($package.version)"
          $actual = "${{ github.ref_name }}"
          if ($actual -ne $expected) {
            Write-Error "Tag '$actual' does not match package.json version '$expected'."
          }

      - name: Build and publish release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          tauriScript: npm run tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: QLTracker ${{ github.ref_name }}
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
